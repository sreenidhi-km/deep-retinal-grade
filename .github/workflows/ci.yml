name: CI - Deep Retina Grade

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 src/ app/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings (non-blocking)
          flake8 src/ app/ tests/ --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Check formatting with black
        run: |
          black --check --diff src/ app/ tests/ || echo "::warning::Code formatting issues found. Run 'black src/ app/ tests/' to fix."

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --tb=short \
            --cov=src \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --cov-report=xml:coverage.xml \
            -x
        env:
          DR_DEMO_MODE: "true"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            htmlcov/
            coverage.xml
          retention-days: 30

      - name: Check coverage threshold
        run: |
          coverage_pct=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(f'{rate * 100:.1f}')
          ")
          echo "Coverage: ${coverage_pct}%"

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pip-audit safety

      - name: Check for known vulnerabilities
        run: |
          pip-audit -r requirements.txt || echo "::warning::Vulnerability scan found issues"
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t deep-retina-grade:${{ github.sha }} .

      - name: Test Docker health check
        run: |
          # Ensure container is always cleaned up, even on failure
          cleanup() { docker stop test-container 2>/dev/null; docker rm test-container 2>/dev/null; }
          trap cleanup EXIT

          docker run -d --name test-container \
            -p 8000:8000 \
            -e DR_DEMO_MODE=true \
            deep-retina-grade:${{ github.sha }}
          
          # Wait for startup
          sleep 15
          
          # Check health endpoint
          curl -f http://localhost:8000/health || exit 1
